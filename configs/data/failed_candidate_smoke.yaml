name: failed_candidate_smoke
seed: 0
input:
  dataset_path: data/processed/rgroup_smoke.jsonl
output:
  candidates_path: data/processed/failed_candidates_smoke.jsonl
  failed_molecules_dir: outputs/molecules/smoke_failed
failure_types:
  - clash
  - interaction_loss
  - anchor_invalid
  - geometry_invalid
limits:
  candidates_per_example: 4
  max_translation_angstrom: 1.5
  max_rotation_degree: 30
  max_anchor_perturbation_angstrom: 2.0
labels:
  store_reference_ligand: true
  store_failure_reason: true
  store_random_seed: true
