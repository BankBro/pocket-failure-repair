name: rgroup_smoke
seed: 0
input:
  complexes_dir: data/raw/smoke_complexes
  max_complexes: 3
  require_protein: true
  require_ligand: true
output:
  dataset_path: data/processed/rgroup_smoke.jsonl
  split_path: data/splits/rgroup_smoke_split.json
rgroup:
  min_edit_atoms: 1
  max_edit_atoms: 12
  max_anchor_atoms: 2
  scaffold_min_atoms: 6
validation:
  require_3d_conformer: true
  require_single_fragment: true
  allow_charged_molecules: true
